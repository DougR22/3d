<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Spinning Cube</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: Arial, sans-serif;
        }
        
        canvas {
            display: block;
        }
        
        .info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 18px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        .controls {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            font-size: 16px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        .controls input {
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div class="info">
        created by Claude Haiku 4.5 in VSCode
    </div>
    <div class="controls">
        <label for="speed">Rotation Speed:</label>
        <input type="range" id="speed" min="0" max="50" step="0.1" value="1">
    </div>
    <canvas id="canvas"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Scene setup
        const canvas = document.getElementById('canvas');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(
            75,
            window.innerWidth / window.innerHeight,
            0.1,
            1000
        );
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x000000, 0.1);

        // Create cube geometry
        const geometry = new THREE.BoxGeometry(2, 2, 2);
        
        // Create materials for each face with different colors
        const materials = [
            new THREE.MeshPhongMaterial({ color: 0xff0000 }), // Red
            new THREE.MeshPhongMaterial({ color: 0x00ff00 }), // Green
            new THREE.MeshPhongMaterial({ color: 0x0000ff }), // Blue
            new THREE.MeshPhongMaterial({ color: 0xffff00 }), // Yellow
            new THREE.MeshPhongMaterial({ color: 0xff00ff }), // Magenta
            new THREE.MeshPhongMaterial({ color: 0x00ffff })  // Cyan
        ];
        
        const cube = new THREE.Mesh(geometry, materials);
        scene.add(cube);

        // Add lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(5, 5, 5);
        scene.add(directionalLight);

        // Position camera
        camera.position.z = 3.5;

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Animation loop
        function animate() {
            requestAnimationFrame(animate);

            // Get rotation speed from slider
            const speed = parseFloat(document.getElementById('speed').value);

            // Rotate the cube
            cube.rotation.x += 0.005 * speed;
            cube.rotation.y += 0.007 * speed;
            cube.rotation.z += 0.003 * speed;

            // Render the scene
            renderer.render(scene, camera);
        }

        // Start animation
        animate();
    </script>
</body>
</html>
